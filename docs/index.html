    <style>
      :root {
        --bg: #f4f6fb;
        --panel: #ffffff;
        --ink: #111827;
        --muted: #6b7280;
        --line: #e5e7eb;
        --brand: #0f766e;
        --brand-soft: #dff5f2;
        --accent: #b45309;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        font-family: Inter, "PingFang SC", "Hiragino Sans GB", sans-serif;
        background:
          radial-gradient(circle at top right, rgba(15,118,110,.09), transparent 24%),
          linear-gradient(180deg, #f8fbff 0%, var(--bg) 100%);
        color: var(--ink);
      }
      .shell {
        max-width: 1240px;
        margin: 0 auto;
        padding: 28px 18px 50px;
      }
      .nav {
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 16px;
        margin-bottom: 20px;
      }
      .brand {
        font-weight: 800;
        letter-spacing: -.03em;
        font-size: 20px;
      }
      .brand small {
        display: block;
        margin-top: 4px;
        font-size: 12px;
        font-weight: 600;
        letter-spacing: .08em;
        color: var(--muted);
        text-transform: uppercase;
      }
      .navchips {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
      }
      .chip {
        padding: 8px 12px;
        border-radius: 999px;
        border: 1px solid var(--line);
        background: rgba(255,255,255,.8);
        font-size: 13px;
        color: #374151;
      }
      .hero {
        display: grid;
        grid-template-columns: 1.3fr .7fr;
        gap: 18px;
        margin-bottom: 22px;
      }
      .hero-main, .hero-side {
        background: var(--panel);
        border: 1px solid var(--line);
        border-radius: 26px;
        padding: 24px;
        box-shadow: 0 16px 30px rgba(17,24,39,.06);
      }
      .hero-main {
        display: flex;
        flex-direction: column;
        justify-content: center;
        text-align: center;
      }
      .eyebrow {
        color: var(--brand);
        font-size: 13px;
        text-transform: uppercase;
        letter-spacing: .14em;
      }
      .hero h1 {
        margin: 10px 0 10px;
        font-size: clamp(30px, 5vw, 50px);
        line-height: 1.06;
        letter-spacing: -.04em;
      }
      .hero p {
        margin: 0;
        color: #4b5563;
        line-height: 1.8;
        max-width: 760px;
        margin-inline: auto;
      }
      .stats {
        display: grid;
        grid-template-columns: repeat(2, 1fr);
        gap: 12px;
      }
      .stat {
        padding: 14px;
        border-radius: 18px;
        background: #f9fafb;
        border: 1px solid var(--line);
      }
      .stat strong {
        display: block;
        font-size: 24px;
        margin-bottom: 4px;
      }
      .filters {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
        margin: 6px 0 22px;
      }
      .archivebar {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 14px;
        margin: 0 0 22px;
        padding: 14px 16px;
        background: rgba(255,255,255,.82);
        border: 1px solid var(--line);
        border-radius: 18px;
        box-shadow: 0 10px 20px rgba(17,24,39,.04);
      }
      .archive-label {
        font-size: 12px;
        font-weight: 800;
        letter-spacing: .12em;
        text-transform: uppercase;
        color: var(--muted);
        white-space: nowrap;
      }
      .archive-tabs {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
        flex: 1;
      }
      .date-btn {
        padding: 10px 16px;
        border-radius: 999px;
        border: 1px solid var(--line);
        background: #f8fafc;
        color: #374151;
        font-size: 13px;
        font-weight: 700;
        cursor: pointer;
        transition: all .18s ease;
      }
      .date-btn:hover {
        border-color: rgba(15,118,110,.25);
        background: #ecfdf5;
        color: var(--brand);
      }
      .date-btn.active {
        background: #111827;
        color: #fff;
        border-color: #111827;
      }
      .filter {
        padding: 10px 14px;
        border-radius: 14px;
        background: var(--panel);
        border: 1px solid var(--line);
        font-size: 13px;
        color: #374151;
      }
      .filter.active {
        background: var(--brand-soft);
        border-color: rgba(15,118,110,.25);
        color: var(--brand);
        font-weight: 700;
      }
      .cards {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(340px, 1fr));
        gap: 18px;
      }
      .card {
        background: var(--panel);
        border: 1px solid var(--line);
        border-radius: 24px;
        padding: 20px;
        display: flex;
        flex-direction: column;
        min-height: 430px;
        box-shadow: 0 14px 26px rgba(17,24,39,.05);
        transition: transform .18s ease, box-shadow .18s ease;
      }
      .card:hover {
        transform: translateY(-3px);
        box-shadow: 0 20px 34px rgba(17,24,39,.09);
      }
      .card-top {
        display: flex;
        justify-content: space-between;
        gap: 12px;
        align-items: flex-start;
      }
      .badge {
        width: 42px;
        height: 42px;
        border-radius: 14px;
        background: #eef7f6;
        color: var(--brand);
        display: grid;
        place-items: center;
        font-weight: 800;
        flex: 0 0 auto;
      }
      .topic {
        display: inline-flex;
        flex-wrap: wrap;
        gap: 6px;
        justify-content: flex-end;
      }
      .pill {
        padding: 6px 9px;
        border-radius: 999px;
        background: #eef7f6;
        color: var(--brand);
        font-size: 11px;
        font-weight: 700;
      }
      .subpill {
        background: #fff7ed;
        color: var(--accent);
      }
      .card h2 {
        margin: 14px 0 14px;
        font-size: 22px;
        line-height: 1.34;
        letter-spacing: -.02em;
      }
      .mini {
        display: grid;
        gap: 8px;
        margin-bottom: 14px;
      }
      .mini div {
        font-size: 13px;
        line-height: 1.6;
        color: #4b5563;
      }
      .mini strong {
        color: #111827;
      }
      .summary, .fit, .notes {
        padding-top: 12px;
        margin-top: 12px;
        border-top: 1px solid var(--line);
      }
      .summary strong, .fit strong, .notes strong {
        display: block;
        margin-bottom: 6px;
        font-size: 12px;
        text-transform: uppercase;
        letter-spacing: .08em;
        color: var(--brand);
      }
      .summary p, .fit p, .notes p {
        margin: 0;
        font-size: 14px;
        line-height: 1.8;
        color: #374151;
      }
      .cta {
        margin-top: auto;
        padding-top: 16px;
      }
      .cta a {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        width: 100%;
        padding: 12px 14px;
        border-radius: 14px;
        text-decoration: none;
        background: #111827;
        color: #fff;
        font-weight: 700;
      }
      @media (max-width: 900px) {
        .hero { grid-template-columns: 1fr; }
        .archivebar { flex-direction: column; align-items: flex-start; }
      }
      @media (max-width: 640px) {
        .shell { padding: 16px 12px 36px; }
        .hero-main, .hero-side, .card { border-radius: 18px; padding: 16px; }
      }
    </style>

      function renderStats(stats) {
        const el = document.getElementById("stats");
        el.innerHTML = stats.map((stat) => `
          <div class="stat">
            <strong>${stat.value}</strong>
            <span>${stat.label}</span>
          </div>
        `).join("");
      }

      function renderRules(rules) {
        const el = document.getElementById("rule-list");
        if (!el) {
          return;
        }
        el.innerHTML = rules.map((rule) => `<li>${rule}</li>`).join("");
      }

      function renderArchiveButtons(entries, activeDate, onClick) {
        const el = document.getElementById("archivebar");
        el.innerHTML = entries.map((entry) => `
          <button class="date-btn ${entry.date === activeDate ? "active" : ""}" data-date="${entry.date}" data-file="${entry.file}">
            ${entry.date}
          </button>
        `).join("");

        el.querySelectorAll(".date-btn").forEach((button) => {
          button.addEventListener("click", () => {
            onClick(button.dataset.date, button.dataset.file);
          });
        });
      }

      function renderCards(items) {
        const el = document.getElementById("cards");
        el.innerHTML = items.map((item, idx) => {
          const index = item.index || String(idx + 1).padStart(2, "0");
          const primaryTag = item.topic?.primary || item.tags?.[0] || "文献";
          const secondaryTag = item.topic?.secondary || item.priority || item.tags?.[1] || "推荐";
          return `
            <article class="card">
              <div class="card-top">
                <div class="badge">${index}</div>
                <div class="topic">
                  <span class="pill">${primaryTag}</span>
                  <span class="pill subpill">${secondaryTag}</span>
                </div>
              </div>
              <h2>${item.title}</h2>
              <div class="mini">
                <div><strong>Authors:</strong> ${item.authors || "-"}</div>
                <div><strong>Venue:</strong> ${item.venue || "-"}</div>
                <div><strong>Date:</strong> ${item.date || "-"}</div>
              </div>
              <div class="summary"><strong>精读要点</strong><p>${item.summary || "-"}</p></div>
              <div class="fit"><strong>与你研究相关</strong><p>${item.fit || "-"}</p></div>
              <div class="cta"><a href="${item.link || "#"}" target="_blank" rel="noopener noreferrer">Open DOI</a></div>
            </article>
          `;
        }).join("");
      }

      function normalizePayload(payload) {
        if (payload.items && payload.items.length > 0 && payload.items[0].authors) {
          return payload;
        }

        if (payload.items) {
          return {
            generatedAt: payload.generatedAt,
            lead: payload.lead || fallbackData.lead,
            stats: fallbackData.stats,
            rules: fallbackData.rules,
            items: payload.items.map((item, idx) => ({
              index: String(idx + 1).padStart(2, "0"),
              tags: [item.track || "文献", item.priority || "推荐"],
              title: item.displayTitle || item.titleZh || item.title,
              authors: "待补充",
              venue: item.sourceName || "待补充",
              date: item.pubDate || "待补充",
              summary: item.summaryZh || item.summary || "",
              fit: item.productValue || item.oneLiner || "",
              link: item.link
            }))
          };
        }

        return fallbackData;
      }

      async function loadArchiveIndex() {
        try {
          const response = await fetch("./archive/index.json", { cache: "no-store" });
          if (response.ok) {
            const parsed = await response.json();
            if (Array.isArray(parsed) && parsed.length > 0) {
              return parsed;
            }
          }
        } catch (error) {
        }
        return Array.isArray(embeddedArchiveEntries) ? embeddedArchiveEntries : [];
      }

      async function loadPayload(file) {
        if (!file) {
          return fallbackData;
        }
        try {
          const response = await fetch(file, { cache: "no-store" });
          if (response.ok) {
            return normalizePayload(await response.json());
          }
        } catch (error) {
        }
        const payload = embeddedArchivePayloads[file];
        return payload ? normalizePayload(payload) : fallbackData;
      }

      async function main() {
        let data = fallbackData;
        let archiveEntries = [];
        try {
          const response = await fetch("./daily-papers-site-data.json", { cache: "no-store" });
          if (response.ok) {
            data = normalizePayload(await response.json());
          }
        } catch (error) {
          data = fallbackData;
        }

        archiveEntries = await loadArchiveIndex();

        const renderAll = (payload) => {
          document.getElementById("page-title").textContent = payload.title || fallbackData.title;
          document.getElementById("page-lead").textContent = payload.lead || fallbackData.lead;
          renderStats(payload.stats || fallbackData.stats);
          renderRules(payload.rules || fallbackData.rules);
          renderCards(payload.items || fallbackData.items);
        };

        renderAll(data);
        if (archiveEntries.length > 0) {
          const activeDate = archiveEntries[0].date;
          renderArchiveButtons(archiveEntries, activeDate, async (date, file) => {
            const payload = await loadPayload(file);
            renderAll(payload);
            renderArchiveButtons(archiveEntries, date, async (nextDate, nextFile) => {
              const nextPayload = await loadPayload(nextFile);
              renderAll(nextPayload);
            });
          });
        }
      }

      main();
    </script>
